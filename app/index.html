<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>AutoTearingSaga</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        height: 100vh;
      }

      /* Left panel - form */
      .panel {
        width: 280px;
        min-width: 280px;
        padding: 16px;
        background: #16213e;
        border-right: 1px solid #0f3460;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 { font-size: 16px; color: #e94560; }

      .form-group { display: flex; flex-direction: column; gap: 4px; }
      label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }

      .radio-group { display: flex; gap: 8px; }
      .radio-group label {
        flex: 1;
        text-align: center;
        padding: 6px 0;
        border: 1px solid #0f3460;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        text-transform: none;
        color: #ccc;
        transition: all 0.15s;
      }
      .radio-group input { display: none; }
      .radio-group input:checked + label {
        background: #0f3460;
        border-color: #e94560;
        color: #fff;
      }

      select, input[type="number"], input[type="text"] {
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 4px;
        padding: 6px 8px;
        color: #e0e0e0;
        font-size: 13px;
      }
      select:focus, input:focus { outline: none; border-color: #e94560; }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
      }
      .checkbox-row input[type="checkbox"] { accent-color: #e94560; }

      .actions { display: flex; gap: 8px; margin-top: auto; }
      button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:disabled { opacity: 0.3; cursor: not-allowed; }
      .btn-run { background: #e94560; color: #fff; }
      .btn-run:hover:not(:disabled) { opacity: 0.85; }
      .btn-stop { background: #333; color: #e94560; border: 1px solid #e94560; }
      .btn-stop:hover:not(:disabled) { background: #3a1c1c; }

      #status {
        font-size: 11px;
        padding: 4px 0;
        color: #666;
        text-align: center;
      }

      /* Right panel - output */
      .output-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      #output {
        flex: 1;
        background: #0a0a1a;
        padding: 12px;
        font-family: 'Cascadia Code', 'Consolas', monospace;
        font-size: 12px;
        white-space: pre-wrap;
        overflow-y: auto;
        line-height: 1.5;
      }

      .android-only, .level-only { transition: opacity 0.2s; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>AutoTearingSaga</h1>

      <div class="form-group">
        <label>Mode</label>
        <div class="radio-group">
          <input type="radio" name="mode" id="mode-level" value="level" checked />
          <label for="mode-level">Level Up</label>
          <input type="radio" name="mode" id="mode-arena" value="arena" />
          <label for="mode-arena">Arena</label>
        </div>
      </div>

      <div class="form-group">
        <label>Platform</label>
        <div class="radio-group">
          <input type="radio" name="platform" id="plat-desktop" value="desktop" checked />
          <label for="plat-desktop">Desktop</label>
          <input type="radio" name="platform" id="plat-android" value="android" />
          <label for="plat-android">Android</label>
        </div>
      </div>

      <div class="form-group">
        <label>Character</label>
        <select id="char-name">
          <option value="">Auto-detect</option>
        </select>
      </div>

      <div class="form-group level-only">
        <label>Tier</label>
        <div class="radio-group">
          <input type="radio" name="tier" id="tier-auto" value="auto" checked />
          <label for="tier-auto">Auto</label>
          <input type="radio" name="tier" id="tier-good" value="good" />
          <label for="tier-good">Good</label>
          <input type="radio" name="tier" id="tier-avg" value="avg" />
          <label for="tier-avg">Avg</label>
          <input type="radio" name="tier" id="tier-bad" value="bad" />
          <label for="tier-bad">Bad</label>
        </div>
      </div>

      <div class="form-group checkbox-row level-only">
        <input type="checkbox" id="fixed-tier" />
        <label for="fixed-tier" style="text-transform:none;color:#ccc">Fixed tier (no fallback)</label>
      </div>

      <div class="form-group android-only">
        <label>Retries</label>
        <input type="number" id="retries" value="4" min="1" max="20" />
      </div>

      <div class="form-group">
        <label>Skip turns</label>
        <input type="number" id="skip" value="0" min="0" />
      </div>

      <div class="form-group level-only">
        <label>Random override</label>
        <input type="text" id="random" placeholder="e.g. up,down,left" />
      </div>

      <div class="actions">
        <button class="btn-run" id="btn-run">Run</button>
        <button class="btn-stop" id="btn-stop" disabled>Stop</button>
      </div>
      <div id="status">Ready</div>
    </div>

    <div class="output-panel">
      <div id="output"></div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
